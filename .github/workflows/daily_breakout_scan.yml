name: Daily Breakout Scan

on:
  schedule:
    # 6am UTC every weekday Tue-Sat (covers Mon-Fri US trading days,
    # since US markets close ~21:00 UTC, give time for yfinance to settle)
    - cron: '0 6 * * 2-6'
  workflow_dispatch:
    inputs:
      as_of_date:
        description: 'Override scan date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine if monthly retrain needed
        id: retrain_check
        run: |
          # Retrain on the 1st of every month OR if config missing
          # Also retrain if existing config's valid_until has passed
          DAY=$(date -u +%d)
          if [ ! -f config/current_rule.json ]; then
            echo "retrain=true" >> $GITHUB_OUTPUT
            echo "Reason: config missing"
          elif [ "$DAY" = "01" ]; then
            echo "retrain=true" >> $GITHUB_OUTPUT
            echo "Reason: month start"
          else
            # Check if rule has expired
            VALID_UNTIL=$(python -c "import json; print(json.load(open('config/current_rule.json')).get('valid_until', ''))")
            TODAY=$(date -u +%Y-%m-%d)
            if [ -n "$VALID_UNTIL" ] && [ "$TODAY" \> "$VALID_UNTIL" ]; then
              echo "retrain=true" >> $GITHUB_OUTPUT
              echo "Reason: rule expired (valid_until=$VALID_UNTIL)"
            else
              echo "retrain=false" >> $GITHUB_OUTPUT
              echo "Skipping retrain"
            fi
          fi

      - name: Fetch latest universe (yfinance)
        run: python scripts/live/fetch_universe.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Monthly retrain (if needed)
        if: steps.retrain_check.outputs.retrain == 'true'
        run: python scripts/live/monthly_retrain.py

      - name: Run daily scanner & generate report
        run: |
          if [ -n "${{ github.event.inputs.as_of_date }}" ]; then
            python scripts/live/daily_report.py --as-of "${{ github.event.inputs.as_of_date }}"
          else
            python scripts/live/daily_report.py
          fi

      - name: Show today's report
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -n "${{ github.event.inputs.as_of_date }}" ]; then
            DATE="${{ github.event.inputs.as_of_date }}"
          fi
          if [ -f "reports/${DATE}.md" ]; then
            echo "=== reports/${DATE}.md ==="
            cat "reports/${DATE}.md"
          fi

      - name: Commit report and rule
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add reports/ config/ data/daily_cache/_meta.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: daily breakout scan ${DATE}

            🤖 Auto-generated by daily_breakout_scan workflow"
            git push
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_id }}
          path: |
            reports/
            config/current_rule.json
            data/daily_cache/_meta.json
          retention-days: 90

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

  deploy-pages:
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
