name: Weekly Insight Report

on:
  schedule:
    # Saturday 07:00 UTC (KST 16:00) — after Friday US close + reports
    - cron: '0 7 * * 6'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate weekly report
        run: python scripts/live/weekly_report.py

      - name: Commit weekly report
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add reports/_weekly_*.html reports/index.html || true
          if git diff --staged --quiet; then
            echo "No new weekly report to commit"
          else
            DATE=$(date -u +%Y-W%V)
            git commit -m "chore: weekly insight report ${DATE}

            🤖 Auto-generated by weekly_report workflow"
            for attempt in 1 2 3; do
              if git push; then break; fi
              echo "Push attempt $attempt failed; rebasing"
              git pull --rebase
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: reports

  deploy-pages:
    needs: weekly
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
